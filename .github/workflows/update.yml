name: Update AI News

on:
  schedule:
    # 06:00 UTC daily — adjust to taste
    - cron: "0 6 * * *"
  workflow_dispatch: {}  # allow manual run from GitHub UI
  push:
    branches: [main]
    paths:
      - "build.py"
      - "requirements.txt"
      - ".github/workflows/update.yml"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate news.json
        run: python build.py

      - name: Commit refreshed data
        run: |
          git config user.name "ai-news-bot"
          git config user.email "ai-news-bot@users.noreply.github.com"
          git add data/news.json data/news.js
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh news $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
